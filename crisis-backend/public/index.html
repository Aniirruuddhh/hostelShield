<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crisis Command Center</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root {
      --bg-color: #0f1115;
      --panel-bg: #1a1d24;
      --accent-red: #e63946;
      --accent-green: #2a9d8f;
      --text-main: #f8f9fa;
      --text-muted: #adb5bd;
      --border-color: #343a40;
    }
    
    body { 
      background: var(--bg-color); 
      color: var(--text-main); 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
      padding: 20px; 
    }
    
    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }
    
    /* Panels */
    .panel { 
      background: var(--panel-bg); 
      border-radius: 12px; 
      padding: 24px; 
      border: 1px solid var(--border-color); 
      box-shadow: 0 8px 16px rgba(0,0,0,0.4); 
    }

    .panel-header {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ALERT PANEL */
    .alert-panel { 
      border-top: 4px solid var(--accent-red); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      text-align: center; 
      transition: border-color 0.3s ease;
    }
    
    .alert-header { 
      margin: 0; 
      font-size: 2.5rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
    }
    
    .status-indicator { 
      margin: 20px 0; 
      padding: 12px 40px; 
      border-radius: 50px; 
      font-weight: 700; 
      font-size: 1.5rem; 
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    
    .status-indicator.all-clear { 
      background: rgba(42, 157, 143, 0.15); 
      color: var(--accent-green); 
      border: 1px solid var(--accent-green); 
      box-shadow: 0 0 15px rgba(42, 157, 143, 0.2);
    }
    
    .status-indicator.active-alert { 
      background: rgba(230, 57, 70, 0.2); 
      color: var(--accent-red); 
      border: 1px solid var(--accent-red); 
      animation: pulse 1s infinite alternate; 
    }
    
    .alert-details { 
      display: flex; 
      gap: 20px; 
      flex-wrap: wrap; 
      justify-content: center; 
      width: 100%;
    }
    
    .alert-detail-box { 
      background: rgba(255,255,255,0.03); 
      padding: 15px 25px; 
      border-radius: 8px; 
      min-width: 120px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .alert-detail-box span { 
      display: block; 
      color: var(--text-muted); 
      font-size: 0.8rem; 
      text-transform: uppercase; 
      margin-bottom: 8px; 
      letter-spacing: 1px;
    }
    
    .alert-detail-box strong { 
      font-size: 1.3rem; 
      color: var(--text-main);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(230, 57, 70, 0.3); text-shadow: 0 0 5px rgba(230, 57, 70, 0.5); }
      100% { box-shadow: 0 0 30px rgba(230, 57, 70, 0.9); text-shadow: 0 0 15px rgba(230, 57, 70, 1); }
    }

    @keyframes map-pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(230, 57, 70, 0.5); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(230, 57, 70, 0.9); z-index: 10; }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(230, 57, 70, 0.5); }
    }

    /* FLOOR MAP */
    .floor-map .floor { 
      margin-bottom: 25px; 
      background: rgba(255,255,255,0.02);
      padding: 20px;
      border-radius: 10px;
    }
    
    .floor-name { 
      font-size: 1.1rem; 
      font-weight: 700; 
      margin-bottom: 15px; 
      color: var(--text-muted); 
      border-bottom: 1px solid var(--border-color); 
      padding-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .room-grid { 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 15px; 
    }
    
    .room { 
      background: #2b303a; 
      border-radius: 8px; 
      padding: 25px 10px; 
      text-align: center; 
      font-weight: 600; 
      font-size: 1.1rem;
      transition: all 0.3s ease; 
      border: 2px solid #3d4453; 
      position: relative;
    }
    
    .room::before {
      content: '';
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .room.active { 
      background: var(--accent-red); 
      color: white; 
      animation: map-pulse 1s infinite ease-in-out; 
      border-color: #ff6b6b; 
      font-weight: 700; 
    }
    
    .room.active::before { background: #fff; box-shadow: 0 0 5px #fff; }

    .room.resolved { 
      background: rgba(42, 157, 143, 0.2); 
      color: var(--text-main); 
      border-color: var(--accent-green); 
    }
    
    .room.resolved::before { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }

    /* INCIDENT LOG */
    .log-table-wrapper { 
      overflow-x: auto; 
    }
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 10px; 
    }
    
    th, td { 
      padding: 16px; 
      text-align: left; 
      border-bottom: 1px solid var(--border-color); 
    }
    
    th { 
      color: var(--text-muted); 
      font-weight: 600; 
      text-transform: uppercase; 
      font-size: 0.85rem; 
      letter-spacing: 1px;
    }
    
    tr { 
      transition: background 0.3s ease; 
    }
    
    tr:hover { 
      background: rgba(255,255,255,0.03); 
    }
    
    tr.row-resolved { 
      background: rgba(42, 157, 143, 0.05); 
    }
    
    tr.row-resolved td { 
      color: var(--text-muted); 
    }
    
    .status-badge { 
      display: inline-block; 
      padding: 6px 10px; 
      border-radius: 4px; 
      font-size: 0.75rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }
    
    .status-badge.new { background: rgba(230, 57, 70, 0.15); color: #ff6b6b; border: 1px solid rgba(230,57,70,0.3); }
    .status-badge.responding { background: rgba(255, 193, 7, 0.15); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
    .status-badge.resolved { background: rgba(42, 157, 143, 0.15); color: var(--accent-green); border: 1px solid rgba(42,157,143,0.3); }
    
    .btn-resolve { 
      background: var(--text-main); 
      color: var(--bg-color); 
      border: none; 
      padding: 8px 16px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 0.85rem; 
      transition: all 0.2s; 
    }
    
    .btn-resolve:hover { 
      background: #e9ecef; 
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    
    .btn-resolve:active {
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .room-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .room-grid { grid-template-columns: repeat(2, 1fr); }
      .alert-header { font-size: 1.8rem; }
      .alert-details { flex-direction: column; width: 100%; }
      .alert-detail-box { width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ALERT PANEL -->
    <div class="panel alert-panel" id="alert-panel">
      <h1 class="alert-header">Crisis Command Center</h1>
      <div id="status-indicator" class="status-indicator all-clear">ALL CLEAR</div>
      
      <div id="alert-details" class="alert-details" style="display: none;">
        <div class="alert-detail-box">
          <span>Room</span>
          <strong id="det-room">-</strong>
        </div>
        <div class="alert-detail-box">
          <span>Alert Type</span>
          <strong id="det-type" style="color: var(--accent-red);">-</strong>
        </div>
        <div class="alert-detail-box">
          <span>Assigned To</span>
          <strong id="det-role">-</strong>
        </div>
        <div class="alert-detail-box">
          <span>Time</span>
          <strong id="det-time">-</strong>
        </div>
      </div>
    </div>

    <!-- FLOOR MAP -->
    <div class="panel floor-map">
      <h2 class="panel-header">Facility Status Map</h2>
      <div id="floor-map-container"></div>
    </div>

    <!-- INCIDENT LOG -->
    <div class="panel">
      <h2 class="panel-header">Recent Incidents Log</h2>
      <div class="log-table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Room</th>
              <th>Type</th>
              <th>Assigned Role</th>
              <th>Time</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="log-body">
            <!-- Populated via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Config
    const FETCH_INTERVAL_MS = 3000;
    
    // State
    let lastAlertId = null;

    // Audio synth for beep - requires user interaction to initialize AudioContext in most modern browsers,
    // but works if triggered automatically sometimes or if browser policy allows.
    function playBeep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        // Create an oscillator
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        osc.type = 'square'; // harsher beep
        osc.frequency.setValueAtTime(880, ctx.currentTime); // A5
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
        
        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
        
        // Second beep
        setTimeout(() => {
          if(ctx.state === 'closed') return;
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.type = 'square';
          osc2.frequency.setValueAtTime(880, ctx.currentTime);
          osc2.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
          gain2.gain.setValueAtTime(0.1, ctx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
          osc2.connect(gain2);
          gain2.connect(ctx.destination);
          osc2.start();
          osc2.stop(ctx.currentTime + 0.3);
        }, 150);
        
      } catch(e) {
        console.error("Audio playback failed", e);
      }
    }

    async function fetchIncidents() {
      try {
        const res = await fetch('/incidents/latest');
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const incidents = await res.json();
        updateDashboard(incidents);
      } catch (err) {
        console.error('Error fetching incidents:', err);
      }
    }

    function updateDashboard(incidents) {
      const tbody = document.getElementById('log-body');
      const roomStates = {};
      
      if (!incidents || incidents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px; color:var(--text-muted)">No recent incidents</td></tr>';
        setAllClear();
        updateMap({});
        return;
      }

      // Clear existing rows
      tbody.innerHTML = '';
      
      const latest = incidents[0];
      
      incidents.forEach(inc => {
        const isResolved = inc.status === 'resolved';
        
        // Track latest state for each room for the map
        if (!roomStates[inc.room_number]) {
           roomStates[inc.room_number] = inc.status;
        }

        const tr = document.createElement('tr');
        if (isResolved) tr.classList.add('row-resolved');
        
        const dateObj = new Date(inc.timestamp);
        const timeStr = isNaN(dateObj.getTime()) ? inc.timestamp : dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        
        tr.innerHTML = `
          <td><strong>${inc.room_number}</strong></td>
          <td style="font-weight: 600; color: ${isResolved ? 'inherit' : 'var(--accent-red)'}">${inc.alert_type}</td>
          <td>${inc.assigned_staff_role}</td>
          <td>${timeStr}</td>
          <td><span class="status-badge ${inc.status}">${inc.status}</span></td>
          <td>
            ${!isResolved 
              ? `<button class="btn-resolve" onclick="resolveIncident(${inc.id})">Mark Resolved</button>` 
              : `<span style="color:var(--text-muted); font-size: 0.85rem; font-weight: 600;">✓ Resolved</span>`}
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Update Top Panel
      if (latest.status !== 'resolved') {
        if (lastAlertId !== latest.id) {
           // Wait a tiny bit before playing audio as browsers might block it if too early
           setTimeout(playBeep, 50);
           lastAlertId = latest.id;
        }
        setActiveAlert(latest);
      } else {
        setAllClear();
      }

      updateMap(roomStates);
    }

    function setAllClear() {
      document.getElementById('status-indicator').className = 'status-indicator all-clear';
      document.getElementById('status-indicator').innerText = 'ALL CLEAR';
      document.getElementById('alert-details').style.display = 'none';
      document.getElementById('alert-panel').style.borderTopColor = 'var(--accent-green)';
    }

    function setActiveAlert(incident) {
      document.getElementById('status-indicator').className = 'status-indicator active-alert';
      document.getElementById('status-indicator').innerText = 'ACTIVE ALERT';
      document.getElementById('alert-details').style.display = 'flex';
      document.getElementById('alert-panel').style.borderTopColor = 'var(--accent-red)';
      
      document.getElementById('det-room').innerText = incident.room_number;
      document.getElementById('det-type').innerText = incident.alert_type.toUpperCase();
      document.getElementById('det-role').innerText = incident.assigned_staff_role.toUpperCase();
      
      const dateObj = new Date(incident.timestamp);
      document.getElementById('det-time').innerText = isNaN(dateObj.getTime()) ? incident.timestamp : dateObj.toLocaleTimeString();
    }

    function updateMap(roomStates) {
      const rooms = document.querySelectorAll('.room');
      rooms.forEach(roomDiv => {
        const roomNum = roomDiv.getAttribute('data-room');
        const state = roomStates[roomNum];
        
        roomDiv.className = 'room'; // reset
        if (state === 'new' || state === 'responding') {
          roomDiv.classList.add('active');
        } else if (state === 'resolved') {
          roomDiv.classList.add('resolved');
        }
      });
    }

    window.resolveIncident = async function(id) {
      try {
        const res = await fetch(`/incidents/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'resolved' })
        });
        
        if (res.ok) {
           // Immediately fetch to update UI fast
           fetchIncidents();
        } else {
           console.error('Resolved failed with status:', res.status);
        }
      } catch (e) {
        console.error('Failed to resolve incident', e);
      }
    }

    // Generate Map Grid
    function generateMap() {
      const mapContainer = document.getElementById('floor-map-container');
      const floors = [
        { name: 'Floor 3', rooms: ['301','302','303','304','305'] },
        { name: 'Floor 2', rooms: ['201','202','203','204','205'] },
        { name: 'Floor 1', rooms: ['101','102','103','104','105'] }
      ];
      
      floors.forEach(f => {
        const floorDiv = document.createElement('div');
        floorDiv.className = 'floor';
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'floor-name';
        headerDiv.innerText = f.name;
        floorDiv.appendChild(headerDiv);
        
        const gridDiv = document.createElement('div');
        gridDiv.className = 'room-grid';
        
        f.rooms.forEach(roomNum => {
          const roomEl = document.createElement('div');
          roomEl.className = 'room';
          roomEl.setAttribute('data-room', roomNum);
          roomEl.innerText = roomNum;
          gridDiv.appendChild(roomEl);
        });
        
        floorDiv.appendChild(gridDiv);
        mapContainer.appendChild(floorDiv);
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      generateMap();
      fetchIncidents();
      setInterval(fetchIncidents, FETCH_INTERVAL_MS);
      
      // Attempt to resume AudioContext if available (browser policy workaround)
      document.body.addEventListener('click', () => {
         const AudioContext = window.AudioContext || window.webkitAudioContext;
         if (AudioContext) {
           const ctx = new AudioContext();
           if (ctx.state === 'suspended') ctx.resume();
         }
      }, { once: true });
    });
  </script>
</body>
</html>
